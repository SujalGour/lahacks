<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catalyst for Care — AAC</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app">

    <!-- ── Landing ─────────────────────────────────────────────────── -->
    <section id="screen-landing" class="screen active">
      <div class="landing-content">
        <div class="logo">👁 Catalyst for Care</div>
        <h1>Gaze-Powered AAC</h1>
        <p>Compose messages letter by letter — gaze at a key for 1.2 seconds to type it.<br>Word predictions appear above the keyboard as you type.</p>
        <button class="mode-card" id="btn-webcam">
          <div class="mode-icon">📷</div>
          <div class="mode-title">Start with Webcam</div>
          <div class="mode-desc">Real gaze tracking — click 9 calibration dots first, then type by looking</div>
        </button>
      </div>
    </section>

    <!-- ── Calibration ────────────────────────────────────────────── -->
    <section id="screen-calibration" class="screen">
      <div class="calib-header">
        <h2>Calibration</h2>
        <p id="calib-instruction">Loading…</p>
        <div class="calib-counter">
          Point <span id="calib-n">1</span> / 9
        </div>
        <div id="calib-progress" class="calib-progress">Click the dot, then hold still</div>
      </div>
      <div id="calib-surface"></div>
      <button class="ghost-btn" id="btn-skip-calib">Skip calibration →</button>
    </section>

    <!-- ── AAC Keyboard Board ─────────────────────────────────────── -->
    <section id="screen-board" class="screen">
      <header id="board-header">
        <button class="ghost-btn" id="btn-back">← Back</button>
        <div id="text-display">
          <span id="text-content" class="placeholder">Start typing…</span>
        </div>
        <button class="ghost-btn" id="btn-recalibrate">Recalibrate</button>
        <div id="mode-badge">👁 Webcam</div>
      </header>

      <!-- Word prediction bar -->
      <div id="prediction-bar">
        <!-- 5 prediction tiles injected by JS -->
      </div>

      <!-- Letter + control grid -->
      <main id="letter-grid">
        <!-- Tiles injected by JS -->
      </main>
    </section>

  </div>

  <!-- Gaze cursor — floats above everything -->
  <div id="gaze-cursor"></div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
